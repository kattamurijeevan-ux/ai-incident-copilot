<!DOCTYPE html>
<html>
<head>
  <title>AI Incident Copilot</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 30px; }
    .container { max-width: 1000px; margin: auto; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px #ddd; }
    button { padding: 12px 18px; border: none; border-radius: 8px; background: #2563eb; color: white; font-size: 16px; cursor: pointer; }
    .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #fee2e2; color: #991b1b; font-weight: bold; }
    pre { white-space: pre-wrap; background: #111827; color: #d1fae5; padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Incident Copilot Dashboard</h1>
    <button onclick="simulateIncident()">Simulate Incident</button>
<button onclick="runRCA()">Run RCA Analysis</button>

    <div id="dashboard"></div>
  </div>

  <script>
    async function simulateIncident() {
      const container = document.getElementById("dashboard");
      container.innerHTML = "<p>Loading incident...</p>";

      const response = await fetch("http://127.0.0.1:8000/simulate");
      const data = await response.json();

      const analysis = data.report.analysis;

      container.innerHTML = `
        <div class="card">
          <h2>Incident Summary</h2>
          <p><strong>Incident ID:</strong> ${data.incident_id}</p>
          <p><strong>Timestamp:</strong> ${data.timestamp}</p>
          <p><strong>Severity:</strong> <span class="badge">${data.incident.severity}</span></p>
          <p><strong>Priority:</strong> ${data.incident.priority}</p>
          <p><strong>Risk Score:</strong> ${data.incident.risk_score}</p>
        </div>

        <div class="card">
          <h2>Root Cause Analysis</h2>
          <p><strong>Most Likely Root Cause:</strong> ${analysis.most_likely_root_cause}</p>
          <p><strong>Recommended Fix:</strong> ${analysis.recommended_fix}</p>
        </div>

        <div class="card">
          <h2>Generated Logs</h2>
          <pre>${data.generated_logs}</pre>
        </div>

        <div class="card">
          <h2>Similar Historical Incidents</h2>
          ${analysis.similar_incidents.map(item => `
            <p>
              <strong>${item.title}</strong><br>
              Root cause: ${item.root_cause}<br>
              Fix: ${item.fix}<br>
              Confidence: ${item.confidence}
            </p>
            <hr>
          `).join("")}
        </div>
      `;
    }
    async function runRCA() {
      const container = document.getElementById("dashboard");
      container.innerHTML = "<p>Running RCA analysis...</p>";

      const response = await fetch("http://127.0.0.1:8000/simulate-rca");
      const data = await response.json();

      const rca = data.rca_report;

      container.innerHTML = `
        <div class="card">
          <h2>Root Cause Analysis Report</h2>
          <p><strong>Incident ID:</strong> ${data.incident_id}</p>
          <p><strong>Timestamp:</strong> ${data.timestamp}</p>
          <p><strong>Priority:</strong> ${rca.incident_priority}</p>
          <p><strong>Risk Score:</strong> ${rca.risk_score}</p>
          <p><strong>Confidence:</strong> ${rca.confidence}</p>
        </div>

        <div class="card">
          <h2>Impacted Services</h2>
          <p>${rca.impacted_services.join(", ")}</p>
        </div>

        <div class="card">
          <h2>Incident Timeline</h2>
          ${rca.timeline.map(item => `
            <p><strong>Step ${item.step}:</strong> [${item.severity}] ${item.event}</p>
          `).join("")}
        </div>

        <div class="card">
          <h2>Suspected Root Cause</h2>
          <p>${rca.suspected_root_cause}</p>
        </div>

        <div class="card">
          <h2>Recommended Remediation Plan</h2>
          <ul>
            ${rca.recommended_remediation_plan.map(action => `
              <li>${action}</li>
            `).join("")}
          </ul>
        </div>
      `;
    }
  </script>
</body>
</html>
